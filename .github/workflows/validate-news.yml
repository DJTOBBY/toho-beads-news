name: Validate news.json

on:
  push:
    paths:
      - "data/news.json"
      - "scripts/validate_news.py"
  pull_request:
    paths:
      - "data/news.json"
      - "scripts/validate_news.py"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run validator
        run: python3 scripts/validate_news.py
